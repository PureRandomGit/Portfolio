{{ define "main" }}
  <h1>{{ .Title }}</h1>

  {{ $dateMachine := .Date | time.Format "2006-01-02" }} <!-- ISO 8601 without time -->
  {{ $dateHuman := .Date | time.Format "January 2, 2006" }} <!-- Human-readable format -->
  <time datetime="{{ $dateMachine }}">{{ $dateHuman }}</time>

  {{ .Content }}
  {{ partial "terms.html" (dict "taxonomy" "tags" "page" .) }}
{{ end }}
