    <!DOCTYPE html>

        <meta charset="UTF-8">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">        <title>Home</title>
    </head>
    <style>
        :root {
            --bg: #1d1e20;
            --accent: rgb(255, 100, 0);
            --primary: #7c7c88;
            --text: white;
            --borderWidth: 2.5px;
        }
        * {
            color: var(--text);
            text-align: center;
            margin:0%;        
            box-sizing: border-box; 
        }
        body {
            background-color: var(--bg);
            font-family: Roboto;
        }
        h1, h2 {
            font-family: Orbitron;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin: 2%;
        }
        .header {
            /* border: 4px var(--accent) solid;
            border-radius: 20px; */
            margin: 3%;
            padding: 1%;
            font-size: 200%;
        }
        .box {
            border: var(--borderWidth) var(--accent) solid;
            border-radius: 10px;
            padding: 1%;
            margin: 1%;
            width: calc(31%);
            min-width: 200px;
            overflow: hidden;   

        }

        /* Nav Bar */
        nav {
            padding: 2%;
        }
        nav a {
            color: var(--primary);
            text-decoration: none;
            font-size: Large;
            margin: 1%;
            padding: 0.5%;
            position: relative;
            display: inline-block;
            overflow: hidden; /* Ensures expanding borders stay within the element */
            transition: color 0.3s;
        }
        nav a::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--borderWidth); /* Initial bottom border height */
            background-color: var(--primary);
            border-radius: 5px;
            z-index: -1; /* Ensure it stays behind the text */
            transition: height 0.3s ease, background-color 0.3s ease;
        }
        nav a:hover::before {
            height: 100%; /* Expands to cover the entire element's border */
            background-color: var(--primary); /* Keeps the accent color */
        }
        nav a:hover {
            color: var(--bg); /* Changes text color when hovered */
        }


        @media (max-width: 768px) {
            .box {
                width: 100%; /* Stack boxes on small screens */
            }
            .header {
                font-size: 4.5vw;
            }
            .box
            nav a {
                font-size: medium;
            }
        }
    </style>
</head>
<body>
