{{ define "main" }}
<div class="search-container">
  <h1>{{ .Title }}</h1>

  <div class="search-content">
    {{ range .Site.RegularPages }}
      <div class="search-item">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <p>{{ .Summary }}</p>
        {{ with .Params.tags }}
        <p>Tags: 
          {{ range . }}
            <span class="tag">{{ . }}</span>
          {{ end }}
        </p>
        {{ end }}
      </div>
    {{ end }}
  </div>
</div>
{{ end }}
